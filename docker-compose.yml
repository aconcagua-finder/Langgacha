services:
  postgres:
    image: postgres:16
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-postgres}"
      POSTGRES_DB: "${POSTGRES_DB:-langgacha}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-langgacha}"]
      interval: 2s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7
    ports:
      - "${REDIS_PORT:-6379}:6379"

  backend:
    build:
      context: ./backend
    environment:
      PORT: "${BACKEND_PORT:-3000}"
      DATABASE_URL: "${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/langgacha?schema=public}"
      REDIS_URL: "${REDIS_URL:-redis://redis:6379}"
      CORS_ORIGIN: "${CORS_ORIGIN:-http://localhost:5173}"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run db:setup && npm run dev"

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_URL: "${VITE_API_URL:-http://localhost:3000}"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"

volumes:
  postgres_data:
  backend_node_modules:
  frontend_node_modules:
